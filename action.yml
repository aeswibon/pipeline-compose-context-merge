name: Pipeline Compose Context Merge
description: Merge stage outputs into pipeline context JSON for composite workflows
branding:
  icon: git-merge
  color: green
inputs:
  context_file:
    description: Path to context JSON file
    required: true
    default: pipeline-context.json
  stage_id:
    description: Stage id key under context
    required: true
  outputs:
    description: JSON object of outputs to merge
    required: true
runs:
  using: node24
  main: dist/index.js
